name: Deploy to AWS

on:
  workflow_dispatch:

permissions:
  id-token: write # unless AWS cannot read Github Jwt token
  contents: read

jobs:
  aws:
    environment: production # github environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install NodeJs
        uses: actions/setup-node@v3
        with:
          node-version: 24
      - name: Install cdk
        run: npm install -g aws-cdk && npm install
        working-directory: ./infra/aws/cdk
      - name: Configure AWS Credentials for management account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_MANAGEMENT_ACCOUNT_ID }}:role/the-atomicity-com-github-actions-role
          aws-region: eu-west-3
      - name: Bootstrap CDK (management account)
        run: cdk bootstrap aws://${{ secrets.AWS_MANAGEMENT_ACCOUNT_ID }}/eu-west-3
        working-directory: ./infra/aws/cdk
      - name: Configure AWS Credentials for prod account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_PROD_ACCOUNT_ID }}:role/the-atomicity-com-github-actions-role
          aws-region: eu-west-3
      - name: Bootstrap CDK (prod account)
        run: |
          cdk bootstrap aws://${{ secrets.AWS_PROD_ACCOUNT_ID }}/eu-west-3 \
            --trust ${{ secrets.AWS_MANAGEMENT_ACCOUNT_ID }} \
            --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess
        working-directory: ./infra/aws/cdk
      - name: Deploy to AWS
        run: cdk deploy --all --require-approval never --context HostedZoneID=${{ secrets.AWS_HOSTED_ZONE_ID }} --context Domain=theatomicity.com --context TlsCertificateUuid=${{ secrets.TLS_CERTIFICATE_UUID }} --context AccountId=${{ secrets.AWS_PROD_ACCOUNT_ID }}
        working-directory: ./infra/aws/cdk
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Setup Mkdocs
        run: pip install --upgrade pip && pip install -r requirements.txt
        working-directory: ./mkdocs-landing
      - name: Build Mkdocs
        run: python -m mkdocs build
        working-directory: ./mkdocs-landing
      - name: Deploy to S3
        run: aws s3 sync --delete ./site/ s3://theatomicity.com
        working-directory: ./mkdocs-landing
